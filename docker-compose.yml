# Docker Compose configuration for containerized LLaMA.cpp models
# File: /Users/liborballaty/LocalProjects/GitHubProjectsDocuments/llm-test-suite/docker-compose.yml
# Description: Manages 10 LLM models in Docker containers for parallel testing
# Author: Libor Ballaty <libor@arionetworks.com>
# Created: 2026-03-26

version: '3.8'

services:
  # Model 1: Phi-3 (8B parameters)
  # Memory: 6.0GB base (conservative), 6.6GB (balanced), 7.2GB (aggressive)
  llm-phi3:
    image: ghcr.io/ggerganov/llama.cpp:server-latest
    container_name: llm-phi3
    ports:
      - "9081:8000"
    volumes:
      - ~/llms:/models:ro
    environment:
      - MODEL=/models/phi3/Phi-3-mini-4k-instruct-fp16.gguf
      - CONTEXT_SIZE=4096
      - N_GPU_LAYERS=9999
      - THREADS=${DOCKER_THREADS:-10}
      - N_BATCH=${DOCKER_N_BATCH:-1024}
      - N_PARALLEL=${DOCKER_N_PARALLEL:-2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 2s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: ${DOCKER_PHI3_MEMORY:-7G}

  # Model 2: Mistral 7B (7B parameters)
